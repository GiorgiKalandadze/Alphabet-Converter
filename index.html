<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c3aed" />
    <meta
      name="description"
      content="Convert between Georgian Mkhedruli (modern) and Nuskhuri (ecclesiastical) scripts."
    />
    <title>Anbani — Mkhedruli ⇄ Nuskhuri</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700&display=swap"
    />
    <script>
      // Set the theme BEFORE React mounts to avoid a flash of the wrong theme.
      // Keep this in sync with src/useTheme.js (same storage key).
      (function () {
        try {
          var stored = localStorage.getItem('anbani:theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
